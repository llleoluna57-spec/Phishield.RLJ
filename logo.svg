<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" role="img" aria-label="RLJ shield logo">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#00c2a8" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="120" height="120" rx="18" fill="#071827" />

  <!-- Shield shape -->
  <g transform="translate(6,6)" filter="url(#shadow)">
    <path d="M54 6 L98 28 V56 C98 84 72 102 54 108 C36 102 10 84 10 56 V28 Z" fill="url(#g)" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
    <path d="M54 14 L90 32 V56 C90 80 68 96 54 100 C40 96 18 80 18 56 V32 Z" fill="rgba(255,255,255,0.06)" />
  </g>

  <!-- RLJ monogram -->
  <text x="60" y="70" font-family="Segoe UI, Roboto, Arial, sans-serif" font-size="32" fill="#071827" font-weight="800" text-anchor="middle" dominant-baseline="middle">RLJ</text>
</svg>
